# Yazi theme (managed by chezmoi).
# Yazi has no built-in Horizon flavor, so this uses gruvbox-dark (a warm dark
# theme) for Yazi's own chrome. Install once with:  ya pkg add bennyyip/gruvbox-dark
# To swap later:  ya pkg add <owner>/<flavor>  then change the name below.
# If the flavor isn't installed, Yazi falls back to its built-in theme.

[flavor]
dark  = "gruvbox-dark"
light = "gruvbox-dark"
