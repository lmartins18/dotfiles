# Yazi — managed by chezmoi. Docs: https://yazi-rs.github.io/docs/configuration/yazi
# Yazi 26.x uses the [mgr] table (the old [manager] name is deprecated).
# Full previews (images, PDF, video, archives, code) come from Yazi's built-in
# previewers; they work once these are on PATH: ffmpeg, 7z, poppler (pdftoppm), jq.
# MIME detection uses file.exe -> YAZI_FILE_ONE (set in wezterm.lua / $PROFILE).

[mgr]
ratio          = [1, 4, 3]
sort_by        = "natural"
sort_dir_first = true
sort_sensitive = false
show_hidden    = false
show_symlink   = true
scrolloff      = 5
linemode       = "size"

[preview]
wrap          = "no"
tab_size      = 2
max_width     = 900
max_height    = 1200
image_delay   = 30
image_filter  = "triangle"
image_quality = 90

[opener]
edit = [
  { run = 'code %*', orphan = true, desc = "VS Code", for = "windows" },
  { run = 'nvim %*', block = true, desc = "nvim", for = "windows" },
]
open = [
  { run = 'start "" "%1"', orphan = true, desc = "Open (default app)", for = "windows" },
]
reveal = [
  { run = 'explorer /select,"%1"', orphan = true, desc = "Reveal in Explorer", for = "windows" },
]

[open]
rules = [
  { url = "*/", use = [ "edit", "open", "reveal" ] },
  { name = "*/", use = [ "edit", "open", "reveal" ] },
  { mime = "/*", use = [ "edit", "reveal" ] },
  { mime = "image/*", use = [ "open", "reveal" ] },
  { mime = "video/*", use = [ "open", "reveal" ] },
  { mime = "application/pdf", use = [ "open", "reveal" ] },
  { url = "*", use = [ "open", "edit", "reveal" ] },
  { name = "*", use = [ "open", "edit", "reveal" ] },
]
